<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safia Schedule v2</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">🍰 Safia<br><span>Schedule v2</span></div>
    <button class="nav active" data-page="dashboard">🏠 Главная</button>
    <button class="nav" data-page="schedule">📅 График</button>
    <button class="nav" data-page="dayoff">🌙 Выходные</button>
    <button class="nav admin-only" data-page="staffing">📊 Штатка</button>
    <button class="nav admin-only" data-page="employees">👥 Сотрудники</button>
    <button class="nav" data-page="history">📜 История</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Главная</h1>
        <p id="weekLabel">Неделя</p>
      </div>
      <div class="top-actions">
        <select id="roleSelect">
          <option value="admin">Админ: Мадина / Аббос ака</option>
          <option value="manager">Менеджер</option>
        </select>
        <select id="weekSelect"></select>
        <button id="newWeekBtn">+ Следующая неделя</button>
        <button id="exportBtn">Скачать Excel</button>
      </div>
    </header>

    <section id="dashboard" class="page active"></section>
    <section id="schedule" class="page"></section>
    <section id="dayoff" class="page"></section>
    <section id="staffing" class="page"></section>
    <section id="employees" class="page"></section>
    <section id="history" class="page"></section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
